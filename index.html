<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Style Image Reveal with Preview & Speed Control</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    canvas { border: 1px solid black; margin-top: 10px; }
    button, select { margin: 10px; padding: 8px 16px; }
  </style>
</head>
<body>
  <h2>Upload Image & Choose Reveal Style</h2>
  <input type="file" id="upload" accept="image/*">
  <br>
  <label for="style">Reveal Style:</label>
  <select id="style">
    <option value="horizontal">Horizontal Wipe</option>
    <option value="vertical">Vertical Wipe</option>
    <option value="diagonal">Diagonal Wipe</option>
    <option value="radial">Radial Reveal</option>
  </select>
  <br>
  <label for="speed">Reveal Speed:</label>
  <select id="speed">
    <option value="2">Slow</option>
    <option value="5" selected>Medium</option>
    <option value="10">Fast</option>
  </select>
  <br>
  <canvas id="canvas" width="600" height="400"></canvas>
  <br>
  <button id="preview">Preview Animation</button>
  <button id="record">Start Recording</button>

  <script>
    const upload = document.getElementById('upload');
    const styleSelect = document.getElementById('style');
    const speedSelect = document.getElementById('speed');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let img = new Image();

    upload.onchange = e => {
      const file = e.target.files[0];
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "gray";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      };
    };

    let progress = 0;
    function animateReveal(style, speed, callback) {
      ctx.save();
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "gray";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = "black";

      if (style === "horizontal") {
        ctx.fillRect(0, 0, progress, canvas.height);
      } else if (style === "vertical") {
        ctx.fillRect(0, 0, canvas.width, progress);
      } else if (style === "diagonal") {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(progress, 0);
        ctx.lineTo(0, progress);
        ctx.closePath();
        ctx.fill();
      } else if (style === "radial") {
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, progress, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      progress += speed;
      let limit = (style === "horizontal") ? canvas.width :
                  (style === "vertical") ? canvas.height :
                  (style === "diagonal") ? Math.max(canvas.width, canvas.height) :
                  Math.max(canvas.width, canvas.height);

      if (progress <= limit) {
        requestAnimationFrame(() => animateReveal(style, speed, callback));
      } else if (callback) {
        callback();
      }
    }

    // Preview-only mode
    document.getElementById('preview').onclick = () => {
      progress = 0;
      const style = styleSelect.value;
      const speed = parseInt(speedSelect.value);
      animateReveal(style, speed, null);
    };

    // Recording mode
    document.getElementById('record').onclick = () => {
      const stream = canvas.captureStream(30); // 30 fps
      const recorder = new MediaRecorder(stream);
      let chunks = [];

      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'reveal_effect.webm';
        a.click();
      };

      recorder.start();
      progress = 0;
      const style = styleSelect.value;
      const speed = parseInt(speedSelect.value);
      animateReveal(style, speed, () => recorder.stop());
    };
  </script>
</body>
</html>
