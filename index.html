<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scratch-to-Video Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        #canvasContainer { position: relative; margin: 20px 0; border: 2px solid #ddd; display: none; }
        canvas { display: block; max-width: 100%; height: auto; }
        .controls { margin-top: 20px; gap: 10px; display: flex; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; font-weight: bold; }
        button:disabled { background: #ccc; }
        #downloadLink { display: none; margin-top: 15px; color: #28a745; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scratch Reveal Video Maker</h2>
    <input type="file" id="imageLoader" accept="image/*">
    
    <div id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="startBtn" disabled>Create Video</button>
    </div>
    <a id="downloadLink">Download Video</a>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const downloadLink = document.getElementById('downloadLink');
    let originalImage = new Image();
    let recorder;
    let chunks = [];

    // 1. Load the Image
    imageLoader.onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalImage.onload = function() {
                setupCanvas();
                document.getElementById('canvasContainer').style.display = 'block';
                startBtn.disabled = false;
            }
            originalImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    function setupCanvas() {
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        resetCanvas();
    }

    function resetCanvas() {
        // Draw the base image
        ctx.drawImage(originalImage, 0, 0);
        // Draw the "scratch" layer on a second temporary canvas or just use a state
        // For video simplicity, we will draw the image, then a cover, then erase the cover.
        ctx.fillStyle = "#888"; // Gray scratch surface
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 2. The Scratch Animation & Recording
    startBtn.onclick = async function() {
        startBtn.disabled = true;
        resetCanvas();
        chunks = [];
        
        // Setup MediaRecorder
        const stream = canvas.captureStream(30); // 30 FPS
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            downloadLink.href = URL.createObjectURL(blob);
            downloadLink.download = 'scratch_reveal.webm';
            downloadLink.style.display = 'block';
            downloadLink.innerText = "Download Video Ready!";
            startBtn.disabled = false;
        };

        recorder.start();
        await animateScratch();
        recorder.stop();
    };

    function animateScratch() {
        return new Promise((resolve) => {
            let x = 0;
            let y = 0;
            let step = canvas.width / 20; // Size of "scratch"
            
            function drawFrame() {
                // IMPORTANT: destination-out makes the brush erase
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, step * 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Logic to move the "scratch" across the screen
                x += step;
                if (x > canvas.width) {
                    x = 0;
                    y += step;
                }

                if (y <= canvas.height) {
                    requestAnimationFrame(drawFrame);
                } else {
                    ctx.globalCompositeOperation = 'source-over'; // Reset
                    resolve();
                }
            }
            drawFrame();
        });
    }
</script>
</body>
</html>
